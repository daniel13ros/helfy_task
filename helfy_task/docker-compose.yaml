services:
  mysql:
    image: mysql:${MYSQL_IMAGE_TAG:-8.0}
    container_name: mysql
    restart: unless-stopped
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      DEBEZIUM_DB_USER: ${DEBEZIUM_DB_USER}
      DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./mysql/02-create-users.sh:/docker-entrypoint-initdb.d/02-create-users.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_net

  zookeeper:
    image: debezium/zookeeper:${DEBEZIUM_IMAGE_TAG:-2.7.3.Final}
    container_name: zookeeper
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app_net

  kafka:
    image: debezium/kafka:${DEBEZIUM_IMAGE_TAG:-2.7.3.Final}
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_net

  connect:
    image: debezium/connect:${DEBEZIUM_IMAGE_TAG:-2.7.3.Final}
    container_name: connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: ${CONNECT_GROUP_ID:-1}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_STORAGE_TOPIC:-connect_configs}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_STORAGE_TOPIC:-connect_offsets}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_STORAGE_TOPIC:-connect_statuses}
    ports:
      - "${CONNECT_HOST_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_net

  connector-init:
    image: curlimages/curl:${CURL_IMAGE_TAG:-8.9.1}
    container_name: connector-init
    depends_on:
      connect:
        condition: service_healthy
    environment:
      CONNECT_URL: http://connect:8083
      CONNECTOR_NAME: ${CONNECTOR_NAME:-mysql-users-connector}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DEBEZIUM_DB_USER: ${DEBEZIUM_DB_USER}
      DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD}
      DATABASE_SERVER_ID: ${DATABASE_SERVER_ID:-184054}
      TOPIC_PREFIX: ${TOPIC_PREFIX:-dbserver1}
    volumes:
      - ./debezium/register-connector.sh:/register-connector.sh:ro
      - ./debezium/mysql-connector.json.template:/config/mysql-connector.json.template:ro
    entrypoint: ["sh", "/register-connector.sh"]
    networks:
      - app_net

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${APP_DB_USER}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TOKEN_TTL_MS: ${TOKEN_TTL_MS:-86400000}
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app_net

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    networks:
      - app_net

  cdc-consumer:
    build: ./consumer
    container_name: cdc-consumer
    restart: unless-stopped
    depends_on:
      connector-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:9092
      TOPIC_PREFIX: ${TOPIC_PREFIX:-dbserver1}
      DB_NAME: ${MYSQL_DATABASE}
      KAFKA_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-cdc-consumer-group}
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
