services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app_net

  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - app_net

  kafka:
    image: wurstmeister/kafka:2.13-2.8.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      zookeeper.connect: zookeeper:2181
      kafka.advertised.listeners: PLAINTEXT://kafka:9092
      kafka.listeners: PLAINTEXT://0.0.0:9092
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - app_net

  connect:
    image: debezium/connect:1.9
    container_name: connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - app_net

  connector-init:
    image: curlimages/curl:7.85.0
    container_name: connector-init
    depends_on:
      connect:
        condition: service_healthy
    environment:
      CONNECT_URL: http://connect:8083
      connector_name: my-sql-connector
      debezium_db_user: root
      debezium_db_password: rootpassword
      database_server_id: 1
      topic_prefix: mydb
    volumes:
      - ./init-connector.sh:/init-connector.sh
    entrypoint: ["/bin/sh", "-c", "/init-connector.sh"]
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      connect:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: mydatabase
      KAFKA_BROKER: kafka:9092
    ports:
      - "5000:5000"
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "3000:3000"
    networks:
      - app_net

  cdc-consumer:
    build:
      context: ./cdc-consumer
      dockerfile: Dockerfile
    container_name: cdc-consumer
    restart: unless-stopped
    depends_on:
      connect:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      kafka_group_id: cdc-consumer-group
      TOPIC_NAME: mydb.mytable
      db_name: mydatabase
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
